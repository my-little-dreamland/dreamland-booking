<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session — My Little Dreamland</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #FFFFFF;
    --ink: #1A1714;
    --ink-soft: #6B6560;
    --ink-faint: #EAE6E0;
    --radius: 14px;
    --radius-sm: 8px;
  }

  /* Tạo hiệu ứng bầu trời xanh pastel và mây bay bồng bềnh ở nền */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    background: #D0EFFF !important; /* Xanh bầu trời pastel dịu mắt */
    font-family: 'Fredoka', sans-serif !important;
    color: var(--ink);
    overflow-x: hidden;
    position: relative;
  }

  /* Tạo mây bằng CSS */
  body::before {
    content: "";
    position: fixed;
    top: 10%; right: -100px;
    width: 200px; height: 60px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 200px;
    box-shadow: -100px 30px 0 10px rgba(255,255,255,0.8), -40px -20px 0 20px rgba(255,255,255,0.8);
    animation: floatClouds 35s linear infinite;
    z-index: -1;
  }
  
  body::after {
    content: "";
    position: fixed;
    bottom: 20%; left: -100px;
    width: 150px; height: 45px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 200px;
    box-shadow: 80px 20px 0 5px rgba(255,255,255,0.7), 40px -15px 0 15px rgba(255,255,255,0.7);
    animation: floatCloudsInverse 45s linear infinite;
    z-index: -1;
  }

  @keyframes floatClouds {
    0% { transform: translateX(0); }
    100% { transform: translateX(-120vw); }
  }
  @keyframes floatCloudsInverse {
    0% { transform: translateX(0); }
    100% { transform: translateX(120vw); }
  }

  /* Thêm hiệu ứng lấp lánh (Sparkle) bằng Text Shadow cho tiêu đề chính */
  .card-title, .success-title {
    font-family: 'Fredoka', sans-serif !important;
    font-weight: 700;
    font-size: 22px !important;
    color: #2c3e50;
    text-shadow: 0 0 10px rgba(255,255,255,0.8), 2px 2px 0px rgba(255,255,255,0.5);
    position: relative;
  }

  /* Header */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--ink-faint);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #E8F0FE;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title { font-family: 'Fredoka', sans-serif !important; font-weight: 700; font-size: 18px; }
  .header-sub { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }

  /* Container */
  .container { max-width: 560px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 10; }

  /* Các cục số 1-2-3 màu cầu vồng kẹo ngọt */
  .steps { display: flex; align-items: center; gap: 0; padding: 28px 0 24px; }
  .step { display: flex; align-items: center; gap: 8px; flex: 1; }
  .step-num {
    font-family: 'Fredoka', sans-serif !important;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    border: 1.5px solid #ffcdb2 !important;
    color: #ffb7b2 !important;
    background: var(--white);
  }
  .step.active .step-num {
    background: #ffb7b2 !important; /* Đang ở bước: Hồng cam đào ngọt */
    border-color: #ffb7b2 !important;
    color: white !important;
    box-shadow: 0 0 8px rgba(255,183,178,0.6);
  }
  .step.done .step-num {
    background: #b5e2fa !important; /* Đã làm xong: Xanh ngọc pastel */
    border-color: #b5e2fa !important;
    color: #4a7259 !important;
  }
  .step.active .step-label { color: #2c3e50 !important; font-weight: 700; }
  .step-label { font-size: 12px; color: var(--ink-soft); }
  .step-line { flex: 1; height: 2px; background: #ffcdb2; margin: 0 8px; max-width: 40px; }

  /* Giao diện Card trắng nổi bật trên nền xanh */
  .card {
    background: var(--white) !important;
    border-radius: var(--radius);
    border: 1px solid rgba(0,0,0,0.05);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
  }
  .card-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 20px; line-height: 1.5; }

  /* Ô chọn ngày */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .date-input, .field input, .field select {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid #EAE6E0 !important;
    border-radius: var(--radius-sm) !important;
    font-family: inherit !important; font-size: 14px; color: var(--ink);
    background: var(--white); outline: none; transition: all 0.15s;
  }
